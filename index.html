<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aware.com</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* container */
.splash {
  opacity: 0;
  animation: fadeIn 2s forwards;
}

/* big title */
.splash h1 {
  font-size: 70px;
  margin-bottom: 20px;
}

/* button */
.enter-btn {
  opacity: 0;
  margin-top: 20px;
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  background: #1a73e8;
  color: white;
  cursor: pointer;
  animation: fadeIn 2s 2s forwards; /* appears later */
}

/* fade animation */
@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>

<body>

<div class="splash">
  <h1>Aware.com</h1>
  <p>Loading secure environment...</p>

  <!-- goes to your current homepage -->
  <button class="enter-btn" onclick="enterSite()">
    Proceed to Home
  </button>
</div>

<script>
function enterSite() {
  window.location.href = "home.html"; // rename your current index.html to home.html
}
</script>

</body>
</html>
