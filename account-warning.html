<!DOCTYPE html>
<html>
<head>
<title>Security Alert!</title>
<link rel="stylesheet" href="index.css">
</head>

<body>

<!-- RED FLASH LAYER -->
<div id="impactScreen"></div>

<!-- OVERLAY WITH BUTTON -->
<div id="impactOverlay">
  <div class="overlay-box">
    <h1 id="fraudTypeTitle">⚠ Fraud Detected!</h1>
    <p id="fraudExplanation"></p>
    <button id="stopSimulationBtn">Stop Simulation</button>
  </div>
</div>  

<div class="navbar">
  <div class="logo">Aware</div>
  <div class="nav-links">
    <a href="home.html">Home</a>
  </div>
</div>

<div class="container">

<h2>⚠ Urgent Security Warning</h2>

<p>Suspicious activity detected on your account.</p>

<p>Your account will be locked in:</p>

<h1 id="timer">30</h1>

<button onclick="verify()">Verify Account</button>

</div>

<script>

let time = 30;

let timerInterval = setInterval(()=>{
  time--;
  document.getElementById("timer").innerText = time;

  if(time <= 0){
    clearInterval(timerInterval);

    triggerImpactRedirect(
      "Urgent Account Warning",
      "Attackers use urgency and fear to pressure users into acting quickly without thinking."
    );
  }

},1000);

function verify(){
  triggerImpactRedirect(
    "Urgent Account Warning",
    "This was a simulated scareware scenario. Attackers create urgency to manipulate users."
  );
}

</script>

<footer>
  © 2026 | Cybersecurity Awareness Training
</footer>

<script src="attack.js"></script>

</body>
</html>
