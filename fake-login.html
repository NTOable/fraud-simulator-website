<!DOCTYPE html>
<html>
<head>
<title>Aware | Login</title>
<link rel="stylesheet" href="index.css">
</head>

<body>

  <!-- RED FLASH LAYER -->
<div id="impactScreen"></div>

<!-- OVERLAY WITH BUTTON -->
<div id="impactOverlay">
  <div class="overlay-box">
    <h1 id="fraudTypeTitle">⚠ Fraud Detected!</h1>
    <p id="fraudExplanation"></p>
    <button id="stopSimulationBtn">Stop Simulation</button>
  </div>
</div>

<div class="navbar">
  <div class="logo">Aware</div>
  <div class="nav-links">
    <a href="home.html">Home</a>
  </div>
</div>

<div class="container">
<h2>Login Required</h2>
<p>Your session expired. Please login to continue.</p>

<form onsubmit="phishAlert(event)">
<input type="text" placeholder="Email" required>
<input type="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>

</div>

<script>
document.querySelector("form").onsubmit = function(e){
  e.preventDefault();

  triggerImpactRedirect(
    "Phishing Login",
    "This was a fake login page. Attackers create identical login forms to steal usernames and passwords."
  );
}
</script>

<footer>
  © 2026 | Cybersecurity Awareness Training
</footer>

<script src="attack.js"></script>

</body>
</html>
