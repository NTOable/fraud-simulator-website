<!DOCTYPE html>
<html>
<head>
<title>Aware | Login</title>
<link rel="stylesheet" href="index.css">
</head>

<body>

  <!-- RED FLASH LAYER -->
<div id="impactScreen"></div>

<!-- OVERLAY WITH BUTTON -->
<div id="impactOverlay">
  <div class="overlay-box">
    <h1 id="fraudTypeTitle">⚠ Fraud Detected!</h1>
    <p id="fraudExplanation"></p>
    <button id="stopSimulationBtn">Stop Simulation</button>
  </div>
</div>

<div class="navbar">
  <div class="logo">Aware</div>
  <div class="nav-links">
    <a href="home.html">Home</a>
  </div>
</div>

<div class="container">
  <div class="page-wrapper">
  <div class="ad-column left">
    <!-- reuse card HTML from home -->
  </div>

  <div class="login-card">
    <h2>Register</h2>
    <form onsubmit="phishAlert(event)">
      <input type="text" placeholder="Username">
      <input type="password" placeholder="Password">
      <button type="submit">Login</button>
    </form>
  </div>

  <div class="ad-column right">
    <!-- reuse card HTML from home -->
  </div>
</div>

</div>

<script>
document.querySelector("form").onsubmit = function(e){
  e.preventDefault();

  triggerImpactRedirect(
    "Phishing Login",
    "This was a fake login page. Attackers create identical login forms to steal usernames and passwords."
  );
}
</script>

<footer>
  © 2026 | Cybersecurity Awareness Training
</footer>

<script src="attack.js"></script>

</body>
</html>
